<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
    <h2>Add Flight</h2>

    <form method="POST">
        <input type="text" name="name" placeholder="Flight Name"><br>
        <input type="text" name="source" placeholder="Source"><br>
        <input type="text" name="destination" placeholder="Destination"><br>
        <input type="text" name="departure" placeholder="Departure"><br>
        <input type="text" name="arrival" placeholder="Arrival"><br>
        <input type="number" name="price" placeholder="Price"><br>
        <input type="text" name="date" placeholder="Date"><br>

        <button type="submit">Add Flight</button>
    </form>
</div>

</body>
</html>
